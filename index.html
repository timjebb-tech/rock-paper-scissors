<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="js/rps.js" defer></script>
</head>
<body>
    


<button class="chooser" id="rock">rock</button>
<button class="chooser" id="paper">paper</button>
<button class="chooser" id="scissors">scissors</button>
<br>
<button id="playRound">play round</button>
<br>
<div>Select rock, paper or scissors and press play!</div>

<p>Your choice: <span id="yourChoice">None</span></p>
<p>Computer choice: <span id="computerChoice">None</span></p>
<p>Result: <span id="result">No game in progress</span></p>
<p>Score: <span id="score">No game in progress</span></p>
<div id="results"></div>
<div id="gameOver"></div>

</body>
</html>
